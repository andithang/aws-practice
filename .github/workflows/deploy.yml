name: Deploy Backend and Frontend

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      ADMIN_API_KEY_VALUE: ${{ secrets.ADMIN_API_KEY_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      S3_ARTIFACTS_BUCKET: ${{ secrets.S3_ARTIFACTS_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install backend dependencies
        run: npm ci
      - name: SAM build
        run: sam build
      - name: Recover stack from ROLLBACK_COMPLETE
        shell: bash
        run: |
          set -euo pipefail
          STACK_STATUS="$(aws cloudformation describe-stacks --stack-name "$SAM_STACK_NAME" --region "$AWS_REGION" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || true)"
          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack $SAM_STACK_NAME is ROLLBACK_COMPLETE. Deleting before deploy..."
            aws cloudformation delete-stack --stack-name "$SAM_STACK_NAME" --region "$AWS_REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$SAM_STACK_NAME" --region "$AWS_REGION"
          else
            echo "Stack status is '$STACK_STATUS'. Continuing."
          fi
      - name: SAM deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_API_KEY_VALUE:-}" ]; then
            echo "::error::Missing required secret ADMIN_API_KEY_VALUE"
            exit 1
          fi
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::error::Missing required secret GEMINI_API_KEY"
            exit 1
          fi

          ADMIN_API_KEY_VALUE_CLEAN="$(printf '%s' "$ADMIN_API_KEY_VALUE" | tr -d '\r\n')"
          GEMINI_API_KEY_CLEAN="$(printf '%s' "$GEMINI_API_KEY" | tr -d '\r\n')"

          sam deploy --s3-bucket "$S3_ARTIFACTS_BUCKET" --no-confirm-changeset --no-fail-on-empty-changeset --stack-name "$SAM_STACK_NAME" --region "$AWS_REGION" --capabilities CAPABILITY_IAM --parameter-overrides \
            GeminiModel="$GEMINI_MODEL" \
            AdminApiKeyValue="$ADMIN_API_KEY_VALUE_CLEAN" \
            GeminiApiKey="$GEMINI_API_KEY_CLEAN"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.FRONTEND_BACKEND_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v5
      - name: Build frontend static export
        run: |
          cd frontend
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
