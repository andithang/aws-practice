name: Build and Deploy SAM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
      - name: SAM build
        run: sam build
      - name: SAM deploy
        env:
          SAM_STACK_NAME: aws-exam-practice
          SAM_REGION: ap-southeast-1
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name "$SAM_STACK_NAME" --region "$SAM_REGION" --capabilities CAPABILITY_IAM
