AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS exam practice generator and static frontend API

Parameters:
  GeminiModel:
    Type: String
    Default: gemini-2.5-flash
  CorsAllowedOrigin:
    Type: String
    Default: https://aws-practice.andithang.org
  DeviceTableName:
    Type: String
    Default: aws_exam_devices

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref QuestionsTable
        DEVICE_TABLE_NAME: !Ref DevicesTable
        GEMINI_MODEL: !Ref GeminiModel
        ADMIN_TOKEN_PARAMETER_NAME: !Ref AdminTokenParameter
        GEMINI_API_KEY_PARAMETER_NAME: !Ref GeminiApiKeyParameter
        CORS_ALLOW_ORIGIN: !Ref CorsAllowedOrigin

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: !Sub "'${CorsAllowedOrigin}'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Api-Key,x-api-key,X-Device-Id'"
        AllowCredentials: true
      Auth:
        ApiKeyRequired: false

  ApiGatewayDefault4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ApiGateway
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsAllowedOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Api-Key,x-api-key,X-Device-Id'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,DELETE,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"

  ApiGatewayDefault5xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ApiGateway
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsAllowedOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Api-Key,x-api-key,X-Device-Id'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,DELETE,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aws_exam_questions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  DevicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DeviceTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AdminTokenParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws-practice/admin-token
      Description: Admin token payload as JSON {"token":"..."}
      Type: String
      Value: '{"token":"change-me"}'

  GeminiApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws-practice/gemini-api-key
      Description: 'Gemini API key payload as JSON {"apiKey":"..."}'
      Type: String
      Value: '{"apiKey":"replace-in-console"}'

  DailyGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: daily-generator/handler.handler
      Timeout: 180
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GeminiApiKeyParameter}
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - daily-generator/handler.ts

  PracticeQuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: practice-questions/handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
      Events:
        GetPracticeQuestions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/practice/questions
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - practice-questions/handler.ts

  DeviceSeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: device-seed/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DevicesTable
      Events:
        DeviceSeed:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/device/seed
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - device-seed/handler.ts

  AdminLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-login/handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminLogin:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/login
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-login/handler.ts

  AdminGenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-generate/handler.handler
      Timeout: 180
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GeminiApiKeyParameter}
      Events:
        AdminGenerate:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/generate
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-generate/handler.ts

  AdminBatchesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-batches/handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminBatches:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/batches
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-batches/handler.ts

  AdminBatchPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-batch-publish/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminBatchPublish:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/batches/{batchId}/publish
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-batch-publish/handler.ts

  AdminBatchDeprecateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-batch-deprecate/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminBatchDeprecate:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/batches/{batchId}/deprecate
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-batch-deprecate/handler.ts

  AdminQuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-questions/handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminQuestions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/questions
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-questions/handler.ts

  AdminQuestionStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-question-status/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminQuestionStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/questions/status
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-question-status/handler.ts

  AdminQuestionAnswerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-question-answer/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuestionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminQuestionAnswer:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/questions/answer
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-question-answer/handler.ts

  AdminDeviceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions
      Handler: admin-device/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DevicesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminTokenParameter}
      Events:
        AdminDeviceList:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/devices
            Method: GET
        AdminDeviceRevoke:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/devices/{deviceId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - admin-device/handler.ts

Outputs:
  ApiBaseUrl:
    Description: Base URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
